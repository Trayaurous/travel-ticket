<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Ticket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="ticket-app">
        <main class="preview-pane">
            <div class="ticket-header">
                <button class="round-btn" type="button" id="resetBtn" title="重置">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
                <div class="brand-title">Travel Ticket</div>
                <button class="round-btn" type="button" id="uploadBtn" title="上传图片">
                    <i class="bi bi-images"></i>
                </button>
            </div>

            <div class="stage" id="stage">
                <canvas id="ticketCanvas" width="1200" height="1200"></canvas>
                <div class="empty-drop" id="emptyDrop">
                    <i class="bi bi-image"></i>
                    <span>点击上传图片</span>
                </div>
            </div>
        </main>

        <aside class="control-pane">
            <section class="section text-section">
                <div class="section-title"><i class="bi bi-type"></i> 文字</div>
                <div class="field">
                    <label for="titleInput">票根标题</label>
                    <textarea id="titleInput" rows="3" maxlength="60">SAN YA</textarea>
                </div>
                <div class="field">
                    <label for="line1Input">小字 1</label>
                    <input id="line1Input" value="NO.772787">
                </div>
                <div class="field">
                    <label for="line2Input">小字 2</label>
                    <input id="line2Input" value="next station">
                </div>
                <div class="field">
                    <label for="dateInput">日期</label>
                    <input id="dateInput" value="2026 - 06">
                </div>
                <div class="field">
                    <label for="fontSelect">字体</label>
                    <select id="fontSelect">
                        <option value="system">System Sans</option>
                        <option value="poster">Bold Poster</option>
                        <option value="mono">Ticket Mono</option>
                        <option value="serif">Editorial Serif</option>
                    </select>
                </div>
            </section>

            <section class="section layout-section">
                <div class="section-title"><i class="bi bi-layout-three-columns"></i> 排版格式</div>
                <div class="layout-grid">
                    <button class="chip active" type="button" data-layout="classic">经典横票</button>
                    <button class="chip" type="button" data-layout="boarding">登机牌</button>
                    <button class="chip" type="button" data-layout="gallery">展览票</button>
                    <button class="chip" type="button" data-layout="compact">紧凑票</button>
                </div>
            </section>

            <section class="section color-section">
                <div class="section-title"><i class="bi bi-eyedropper"></i> 颜色</div>
                <div id="colorPickers"></div>
            </section>

            <section class="section ratio-section">
                <div class="section-title"><i class="bi bi-aspect-ratio"></i> 导出比例</div>
                <div class="ratio-grid">
                    <button class="chip active" type="button" data-ratio="1:1">1:1</button>
                    <button class="chip" type="button" data-ratio="3:2">3:2</button>
                    <button class="chip" type="button" data-ratio="2:3">2:3</button>
                    <button class="chip" type="button" data-ratio="16:9">16:9</button>
                    <button class="chip" type="button" data-ratio="9:16">9:16</button>
                </div>
            </section>

            <button class="primary-btn" type="button" id="exportBtn">
                <i class="bi bi-download"></i> 保存
            </button>
        </aside>
    </div>

    <input id="imageInput" type="file" accept="image/*" hidden>
    <script src="./app.js"></script>
</body>
</html>
